meta:
  version: 1
  description: structure of UppASD datasets, combined DFT and spindynamics inputs and outputs
filesystem-schema:
  dataset-schema.yaml: {type: file, required: true}
  DOSCAR: {type: file, required: false}
  README.md: {type: file, required: false}
  intrinsic_properties.yaml: {type: file, required: true}
  structure.cif: {type: file, required: true}
  RSPt:
    type: directory
    required: true
    schema:
      README.md: {type: file, required: false}
      common_input:
        type: directory
        required: true
        schema:
          atomdens: {type: file, required: true}
          kmap: {type: file, required: true}
          spts: {type: file, required: true}
          symcof: {type: file, required: true}
          symt.inp: {type: file, required: true}
      gs_x: &gs_dir
        type: directory
        required: true
        schema:
          data: {type: file, required: true}
          out_last: {type: file, required: true}
          hist: {type: file, excludes: out_MF, required: true}
          out_MF: {type: file, excludes: hist, required: true}
      gs_y: {<<: *gs_dir, required: false}
      gs_z: *gs_dir
      Jij:
        type: directory
        required: true
        keysrules:
          regex: '^(data|out_last|green\.inp-.+|out-.+)$'
        valuesrules:
          type: file
        schema:
          data: {type: file, required: true}
          out_last: {type: file, required: true}
        allow_unknown:
          type: file
        paired_prefix: ['green.inp-', 'out-']
  UppASD:
    type: directory
    required: true
    schema:
      MC_1: &MC_dir
        type: directory
        required: true
        schema:
          jfile: {type: file, required: true}
          momfile: {type: file, required: true}
          posfile: {type: file, required: true}
          inpsd.dat: {type: file, required: true}
          thermal.csv: {type: file, required: true}
          thermal.dat: {type: file, required: true}
      MC_2: {<<: *MC_dir, required: false}
      MC_3: {<<: *MC_dir, required: false}
      README.md: {type: file, required: false}
file-schema:
  - files: [instrinsic_properties.yaml]
    validator: mammos_entity_file
    schema:
      Js: {type: mammos_entity.Entity, ontology_label: SpontaneousMagneticPolarisation}
      Ms: {type: mammos_entity.Entity, ontology_label: SpontaneousMagnetization}
      MAE: {type: mammos_entity.Entity, ontology_label: MagnetocrystallineAnisotropyEnergy}
      Tc: {type: mammos_entity.Entity, ontology_label: CurieTemperature}
  - files:
      - UppASD/MC_1/thermal.csv
      - UppASD/MC_2/thermal.csv
      - UppASD/MC_3/thermal.csv
    validator: mammos_entity_file
    description: Entites required in files UppASD/MC_*/thermal.csv
    schema:
      T: {type: mammos_entity.Entity, ontology_label: ThermodynamicTemperature}
      Ms: {type: mammos_entity.Entity, ontology_label: SpontaneousMagnetization}
      Cv: {type: mammos_entity.Entity, ontology_label: IsochoricHeatCapacity}
  - file: [dataset-schema.yaml]
    validator: yaml_file
    schema:
      version: {type: string, value: 1}
